services:
  - type: web
    name: findtern-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn bot:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.10.12"
